# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 20
    groups:
      angular:
        patterns: ["@angular/*", "@angular-architects/*"]
      tooling:
        patterns: ["typescript", "karma*", "jasmine*"]

  - package-ecosystem: "npm"
    directory: "/angular-shell"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 20
    groups:
      angular:
        patterns: ["@angular/*", "@angular-architects/*"]
      tooling:
        patterns: ["typescript", "karma*", "jasmine*"]

  - package-ecosystem: "npm"
    directory: "/angular-toolbar"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 20
    groups:
      angular:
        patterns: ["@angular/*", "@angular-architects/*"]
      tooling:
        patterns: ["typescript", "karma*", "jasmine*"]

  - package-ecosystem: "npm"
    directory: "/angular-libs"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 20
    groups:
      angular:
        patterns: ["@angular/*", "@angular-architects/*"]
      tooling:
        patterns: ["typescript", "karma*", "jasmine*"]

  - package-ecosystem: "npm"
    directory: "/angular-libs/projects/broker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 20
    groups:
      angular:
        patterns: ["@angular/*", "@angular-architects/*"]

  - package-ecosystem: "npm"
    directory: "/angular-menu"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 20
    groups:
      angular:
        patterns: ["@angular/*", "@angular-architects/*"]
      tooling:
        patterns: ["typescript", "karma*", "jasmine*"]

  - package-ecosystem: "npm"
    directory: "/angular-overview"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 20
    groups:
      angular:
        patterns: ["@angular/*", "@angular-architects/*"]
      tooling:
        patterns: ["typescript", "karma*", "jasmine*"]
