<p-menu #userMenu [popup]="true" [model]="userMenuItems"></p-menu>

<p-button
  [rounded]="true"
  [text]="true"
  (click)="userMenu.toggle($event)"
  label="John Doe"
  icon="pi pi-user"
>
</p-button>

<p-button
  [rounded]="true"
  [text]="true"
  (click)="op.toggle($event)"
  icon="pi pi-cog"
>
</p-button>

<p-popover #op styleClass="theme-menu">
  <p-button
    label="Light"
    [text]="true"
    styleClass="light"
    (click)="changeTheme('light-theme')"
  >
    <span class="color-circle"></span>
  </p-button>

  <p-button
    label="Dark"
    [text]="true"
    styleClass="dark"
    (click)="changeTheme('dark-theme')"
  >
    <span class="color-circle"></span>
  </p-button>
</p-popover>
