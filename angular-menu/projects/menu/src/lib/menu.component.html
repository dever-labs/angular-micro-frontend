<button class="logo" [routerLink]="['/']"></button>

<div class="search-hint" role="button" tabindex="0" (click)="appState.openSearch()" (keydown.enter)="appState.openSearch()">
  <i class="pi pi-search"></i> Search <kbd>S</kbd>
</div>

@for (group of groups(); track group.label) {
  <div class="menu">
    <div class="category">{{ group.label }}</div>
    <div class="items">
      @for (item of group.items; track item.path) {
        <button
          pButton
          [routerLink]="['/' + item.path]"
          type="button"
          [label]="item.label"
          [icon]="item.icon ?? ''"
          class="p-button-text"
        ></button>
      }
    </div>
  </div>
}
