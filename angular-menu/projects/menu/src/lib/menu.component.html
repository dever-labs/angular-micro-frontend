<button class="logo" [routerLink]="['/']"></button>

<button class="search-hint" type="button" (click)="appState.openSearch()">
  <i class="pi pi-search"></i>
  <span class="search-placeholder">Search…</span>
  <kbd>S</kbd>
</button>

@for (group of groups(); track group.label) {
  <div class="menu">
    <div class="category">{{ group.label }}</div>
    <div class="items">
      @for (item of group.items; track item.path) {
        <button
          pButton
          [routerLink]="['/' + item.path]"
          type="button"
          [label]="item.label"
          [icon]="item.icon ?? ''"
          class="p-button-text"
        ></button>
      }
    </div>
  </div>
}
