events{}

http {
include /etc/nginx/mime.types;

server {
listen 80;
server_name localhost;

location / {
proxy_pass http://shell:80;
}

location ~ ^/getModule/overview(.*) {
proxy_pass http://overview:80$1;
}

location ~ ^/getModule/menu(.*) {
proxy_pass http://menu:80$1;
}

location ~ ^/getModule/toolbar(.*) {
proxy_pass http://toolbar:80$1;
}
}
}
